# Full diagnostics config for representative 20.06 run:
# 2032_modeD_slow_lite_long_asw005_alw0700_amr30_vsw007_vbw0800_vmr28_ttl090_hold01
#
# Run example:
#   python -m supertrend_optimizer.cli.tester --csv data.csv --config config_tester.yaml --out result_2032_full_diagnostics.xlsx

supertrend:
  atr_period: 20
  multiplier: 1.0

trade_mode: long
period: false

commission: 0.0000

warmup_period: 0
warmup_period_auto: true

periods_per_year: 252
annualization_basis: trading
execution_model: open_to_open
min_trades_required: 3

early_exit:
  enabled: false
  max_drawdown: 0.50
  check_bars: 50

segmentation:
  mode: legacy
  n_parts: 7

export:
  diagnostics: true
  signals: true
  false_start: true
  cycle: true
  trades: true
  false_start_max_bars: 4

trade_filter:
  enabled: true
  type: zigzag_st_mode

  zigzag:
    enabled: true
    mode: D
    global_stats_source: full_dataset
    leg_height_mode: pct
    reversal_threshold: 0.001
    candidate_trigger_threshold: 0.012
    global_median: auto
    local_window: 5
    daily_reset: false
    candidate_duration_gate:
      enabled: false

  lifecycle:
    freeze_confirmed_legs: 3
    stop_check: confirm_bar_only
    stopping_exit: opposite_st_flip
    exit_off_mode: "exit C"

  time_filter:
    enabled: true
    window: "09:00-19:00"

  volume:
    enabled: false
    mode: volume_A
    aggregation: mean
    daily_reset: true
    cycle_direction_gate: false
    short_window: 10
    baseline_window: 1000
    threshold_ratio: 1.6
    exit_hysteresis_ratio: 1.6
    exit_freeze_bars: 5
    regime_low_ratio: 0.8
    regime_high_ratio: 1.2
    direction_lookback_bars: 5
    baseline_session:
      enabled: true
      window: "09:00-19:00"

  wakeup_regime:
    enabled: true
    lock_cycle_direction: false
    entry:
      candidate_height:
        enabled: false
        quantile: 0.65
      candidate_age:
        enabled: false
        max_bars: 10
      atr_expansion:
        enabled: true
        short_window: 5
        long_window: 700
        min_ratio: 3.0
      volume_expansion:
        enabled: true
        short_window: 7
        baseline_window: 800
        min_ratio: 2.8

    exit:
      ttl:
        enabled: true
        bars: 90
      no_fresh_candidate:
        enabled: false
        quantile: 0.60
        max_age_bars: 15
        timeout_bars: 20
      action:
        mode: close_position

    position_freeze:
      enabled: true
      min_hold_bars: 1
      apply_to: internal_opposite_st_flip
      release_action: apply_if_still_opposite
