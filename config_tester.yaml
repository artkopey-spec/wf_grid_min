# Tester-compatible config, aligned with the equivalent parameters in config.yaml.
# Variant: daily_reset=false, exit_freeze_bars=10, exit_hysteresis_ratio=2.2.

supertrend:
  atr_period: 20
  multiplier: 1.0

trade_mode: revers

commission: 0.0000

warmup_period: 0
warmup_period_auto: true

periods_per_year: 252
annualization_basis: trading
execution_model: open_to_open
min_trades_required: 3

early_exit:
  enabled: false
  max_drawdown: 0.50
  check_bars: 50

segmentation:
  mode: legacy
  n_parts: 7

export:
  diagnostics: true
  signals: false
  false_start: false
  cycle: true
  trades: false
  false_start_max_bars: 4

trade_filter:
  enabled: true

  zigzag:
    enabled: false

  time_filter:
    enabled: false
    window: "09:00-19:00"

  volume:
    enabled: true
    daily_reset: false
    mode: volume_A
    aggregation: mean
    short_window: 30
    baseline_window: 1000
    threshold_ratio: 2.2
    exit_hysteresis_ratio: 1.8
    exit_freeze_bars: 10
    regime_low_ratio: 0.8
    regime_high_ratio: 1.2
    direction_lookback_bars: 10
    baseline_session:
      enabled: true
      window: "09:00-19:00"
