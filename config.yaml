schema_version: 1
# General WF Grid profile: time_filter активен, volume отключён (в data.csv нет volume).
# Адаптировано под текущий data.csv: 717 баров, 1m, 3 торговых дня (2026-06-12/15/16),
# сессия ~16:30–22:59 MSK (+03:00).
# Запуск: python run.py --config config.yaml

data:
  file_path: "data.csv"
  periods_per_year: "auto"
  annualization_basis: "trading"

optimization:
  atr_period_range: [20, 90]
  multiplier_range: [1.0, 9.0]
  multiplier_step: 0.2
  atr_period_step: 3
  trade_mode: "revers"

backtest:
  commission: 0.0000
  min_trades_required: 3
  early_exit_enabled: false
  early_exit_max_drawdown: 0.50
  early_exit_check_bars: 50

validation:
  warmup_period: 0
  warmup_period_auto: true
  walk_forward:
    train_size: "600bars"
    test_size: "117bars"
    step_size: "117bars"
    scheme: "rolling"
    anchor: "end"
    min_train_bars: 50
    min_test_bars: 15

gates:
  step:
    min_trades: 0
    max_drawdown_threshold: -10.0
  candidate:
    positive_median_threshold: -1000.0
    min_trades_median: 0.0
    worst_segment_pnl_threshold: null
    max_drawdown_threshold: -10.0
    min_total_trades: 0
    min_ok_ratio: 0.0

ranking:
  mode: "gates_score"
  min_segments_for_ranking: null
  sort_by: "sum_pnl_pct_Median"
  tiebreaker: "sum_pnl_pct_Min"

scoring:
  normalization_mode: "rank"
  min_passed_for_discrimination: 1
  low_spread_threshold: 1.0e-6
  score_weights:
    sum_pnl_pct_Median:        0.42
    profitable_segments_count: 0.34
    abs_max_drawdown_Median:   0.12
    abs_max_drawdown_Min:      0.12

status:
  min_meaningful_bars: 1

bucket:
  atr_bucket_step: 3
  mult_bucket_step: 0.2
  min_buckets_for_median: 1

execution:
  parallel_enabled: true
  max_workers: null
  chunksize: null
  fallback_to_sequential: false

export:
  retain_per_bar_filter_diagnostics: false

trade_filter:
  enabled: false
  # type: "zigzag_st_mode"  # раскомментировать при включении zigzag

  zigzag:
    enabled: false
    # global_stats_source: "full_dataset"
    # leg_height_mode: "pct"
    # reversal_threshold: 0.002
    # candidate_trigger_threshold: auto
    # candidate_trigger_quantile: 0.80
    # global_median: "auto"
    # local_window: 5
    # daily_reset: true
    # mode: "A+B"
    # candidate_duration_gate:
    #   enabled: true
    #   max_bars: 30

  # lifecycle:                        # нужен только при zigzag.enabled: true
  #   freeze_confirmed_legs: 5
  #   stop_check: "confirm_bar_only"
  #   stopping_exit: "opposite_st_flip"
  #   exit_off_mode: "exit B"
  #   exit_off_zz_leg_count: 5
  #   exit_b_immediate_off: false

  # diagnostics:                      # нужен только при zigzag.enabled: true
  #   export_state_columns: true
  #   export_trigger_columns: true

  time_filter:
    enabled: false
    window: "16:30-23:00"

  volume:
    enabled: false
    mode: "volume_A"
    aggregation: median
    short_window: 24
    baseline_window: 1000
    threshold_ratio: 2.0
    regime_low_ratio: 0.8
    regime_high_ratio: 1.2
    direction_lookback_bars: 10
    baseline_session:
      enabled: false
      window: null
