# Full diagnostics config for mass-run config #0551:
# lite_atr010_mult10_ch_q060_ttl090_hold03_lw13_rev005
#
# Run example:
#   python -m supertrend_optimizer.cli.tester --csv data.csv --config config_tester.yaml --out result_lite_atr010_mult10_ch_q060_ttl090_hold03_lw13_rev005_full_diagnostics.xlsx

supertrend:
  atr_period: 10
  multiplier: 1.0

trade_mode: revers
period: false

commission: 0.0000

warmup_period: 0
warmup_period_auto: true

periods_per_year: 252
annualization_basis: trading
execution_model: open_to_open
min_trades_required: 3

early_exit:
  enabled: false
  max_drawdown: 0.50
  check_bars: 50

segmentation:
  mode: legacy
  n_parts: 7

export:
  diagnostics: true
  signals: true
  false_start: true
  cycle: true
  trades: true
  false_start_max_bars: 4
  diagnostics_v2: true
  diagnostics_v2_flags: {}

trade_filter:
  enabled: true
  type: zigzag_st_mode

  diagnostics:
    export_state_columns: true
    export_trigger_columns: true

  zigzag:
    enabled: true
    mode: D
    global_stats_source: full_dataset
    leg_height_mode: pct
    reversal_threshold: 0.005
    candidate_trigger_threshold: 0.012
    global_median: auto
    local_window: 13
    daily_reset: false
    candidate_duration_gate:
      enabled: false

  lifecycle:
    freeze_confirmed_legs: 3
    stop_check: confirm_bar_only
    stopping_exit: opposite_st_flip
    exit_off_mode: "exit C"

  time_filter:
    enabled: false
    window: "09:00-19:00"

  volume:
    enabled: false
    mode: volume_A
    aggregation: mean
    daily_reset: true
    cycle_direction_gate: false
    short_window: 10
    baseline_window: 1000
    threshold_ratio: 1.6
    exit_hysteresis_ratio: 1.6
    exit_freeze_bars: 5
    regime_low_ratio: 0.8
    regime_high_ratio: 1.2
    direction_lookback_bars: 5
    baseline_session:
      enabled: false
      window: "09:00-19:00"

  wakeup_regime:
    enabled: true
    lock_cycle_direction: false
    entry:
      candidate_height:
        enabled: true
        quantile: 0.6
      candidate_age:
        enabled: false
        max_bars: 10
      atr_expansion:
        enabled: false
        short_window: 30
        long_window: 400
        min_ratio: 1.6
      volume_expansion:
        enabled: false
        short_window: 10
        baseline_window: 1000
        min_ratio: 0.5

    exit:
      ttl:
        enabled: true
        bars: 90
      no_fresh_candidate:
        enabled: false
        quantile: 0.60
        max_age_bars: 15
        timeout_bars: 20
      local_median_stop:
        enabled: true
      action:
        mode: close_position

    position_freeze:
      enabled: true
      min_hold_bars: 3
      apply_to: internal_opposite_st_flip
      release_action: apply_if_still_opposite
