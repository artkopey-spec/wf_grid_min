# Tester config template for supertrend_optimizer.cli.tester.
#
# Run example:
#   python -m supertrend_optimizer.cli.tester --csv data.csv --config config_tester.yaml --out result.xlsx
#
# CLI-only options, not YAML keys:
#   --csv, --out, --config, --exact-output-path
#
# This file intentionally keeps a valid Mode D + wakeup_regime + exit C profile.
# Some generic trade_filter options are valid in other modes, but forbidden with
# Mode D / exit C by the current validator. Those options are left commented.

supertrend:
  atr_period: 20
  multiplier: 1.0

trade_mode: revers
commission: 0.0

warmup_period: 0
warmup_period_auto: true
min_trades_required: 3

# annualization_factor and periods_per_year are aliases in the loader.
# If both are present, annualization_factor wins.
annualization_factor: 252
# periods_per_year: 252
annualization_basis: trading
market: null
execution_model: open_to_open

# Legacy period slices. With segmentation.mode=legacy, Tester exports
# 100%, 75%, 50%, 33%, and 25% periods when period=true.
period: true

# trade_filter.enabled=true is supported only with legacy segmentation.
segmentation:
  mode: legacy
  n_parts: 7

# Present in the accepted root schema. The current tester config loader does
# not pass this block into run_all_periods, but it is still an allowed YAML
# block for this script.
early_exit:
  enabled: false
  max_drawdown: 0.5
  check_bars: 50

export:
  diagnostics: true
  signals: true
  false_start: false
  cycle: true
  trades: true
  false_start_max_bars: 4

trade_filter:
  enabled: true
  type: zigzag_st_mode

  diagnostics:
    export_state_columns: true
    export_trigger_columns: true

  zigzag:
    enabled: true
    mode: D
    global_stats_source: full_dataset
    leg_height_mode: pct
    reversal_threshold: 0.005
    candidate_trigger_threshold: 0.012
    # Use only with candidate_trigger_threshold: auto.
    # candidate_trigger_quantile: 0.80
    global_median: auto
    local_window: 5
    daily_reset: false
    candidate_duration_gate:
      enabled: false
      # max_bars is allowed only when enabled=true.
      # max_bars: 10
    # Deprecated v3 key; listed by schema only to emit a specific error.
    # candidate_entry: true

  lifecycle:
    freeze_confirmed_legs: 3
    stop_check: confirm_bar_only
    stopping_exit: opposite_st_flip
    exit_off_mode: "exit C"
    # exit_off_zz_leg_count is allowed only with exit_off_mode: "exit B".
    # exit_off_zz_leg_count: 2
    # exit_b_immediate_off is allowed only with exit_off_mode: "exit B".
    # exit_b_immediate_off: false

  # Legacy trigger block. It is valid only when zigzag.mode is absent, and it is
  # forbidden with exit_off_mode: "exit C".
  # triggers:
  #   candidate_threshold:
  #     enabled: true
  #   confirmed_median:
  #     enabled: true

  time_filter:
    enabled: false
    window: "09:00-19:00"

  volume:
    enabled: false
    mode: volume_A
    aggregation: mean
    daily_reset: true
    cycle_direction_gate: false
    short_window: 70
    baseline_window: 1000
    threshold_ratio: 2.6
    exit_hysteresis_ratio: 2.6
    exit_freeze_bars: 17
    regime_low_ratio: 0.8
    regime_high_ratio: 1.2
    direction_lookback_bars: 30
    baseline_session:
      enabled: true
      window: "09:00-19:00"

  wakeup_regime:
    enabled: true

    entry:
      candidate_height:
        enabled: true
        quantile: 0.65
      candidate_age:
        enabled: false
        max_bars: 10
      atr_expansion:
        enabled: false
        short_window: 5
        long_window: 60
        min_ratio: 1.3
      volume_expansion:
        enabled: true
        short_window: 10
        baseline_window: 100
        min_ratio: 1.3

    exit:
      ttl:
        enabled: true
        bars: 45
      no_fresh_candidate:
        enabled: true
        quantile: 0.60
        max_age_bars: 15
        timeout_bars: 20
      action:
        # block_new_entries: keep current position, block new entries after exit C.
        # close_position: close the current position immediately on exit C.
        mode: close_position
